<!DOCTYPE html>
<html {dir}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <title>{title}</title>
    <script>
        function checkApproval() {
            fetch('/approve-check?token={token}')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'approved') {
                        window.location.reload();
                    } else if (data.status === 'rejected') {
                        document.body.innerHTML = `
                            <div class="container" style="text-align:center;">
                                <div style="font-size: 56px; margin-bottom:18px;">❌</div>
                                <h1 style="color:var(--error);">{rejectedTitle}</h1>
                                <p class="subtitle" style="margin-bottom:0;">{rejectedMessage}</p>
                            </div>
                        `;
                    } else {
                        setTimeout(checkApproval, 2000);
                    }
                })
                .catch(err => {
                    console.error('Error checking approval:', err);
                    setTimeout(checkApproval, 3000);
                });
        }
        window.onload = checkApproval;
    </script>
</head>
<body>
    <div class="container" style="text-align: center;">
        <div class="pulse-container">
            <div class="pulse-circle"></div>
        </div>
        <h1>{title}</h1>
        <p class="subtitle" style="margin-bottom:0;">{message}</p>
    </div>
</body>
</html>
